name: Swarm Drone CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ─── Java Services Test ───
  test-java:
    name: Test Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [telemetry, anomaly, alert, drone-mgmt]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: |
          cd backend/${{ matrix.service }}
          mvn clean package -DskipTests -B

  # ─── Frontend Verify ───
  verify-frontend:
    name: Verify Frontend Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify static files exist
        run: |
          test -f frontend/dashboard/public/index.html && echo "✅ index.html found"
          test -f frontend/dashboard/public/app.js && echo "✅ app.js found"
          test -f frontend/dashboard/public/style.css && echo "✅ style.css found"

  # ─── Docker Build ───
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-java, verify-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Telemetry Service
        run: docker build -t swarm-telemetry:latest ./backend/telemetry

      - name: Build Anomaly Service
        run: docker build -t swarm-anomaly:latest ./backend/anomaly

      - name: Build Alert Service
        run: docker build -t swarm-alert:latest ./backend/alert

      - name: Build Drone Management Service
        run: docker build -t swarm-drone-mgmt:latest ./backend/drone-mgmt

      - name: Build Dashboard
        run: docker build -t swarm-dashboard:latest ./frontend/dashboard

  # ─── Docker Compose Deploy ───
  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker compose up -d --build
          sleep 60
          echo "✅ Deployment complete"

      - name: Health Check
        run: |
          echo "Checking services..."
          curl -f http://localhost:8001/health || echo "Telemetry: waiting..."
          curl -f http://localhost:8003/health || echo "Anomaly: waiting..."
          curl -f http://localhost:8004/health || echo "Alert: waiting..."
          echo "✅ Health checks done"

      - name: Cleanup
        if: always()
        run: docker compose down -v
