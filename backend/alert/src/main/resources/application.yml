# ═══════════════════════════════════════════════════════
# ALERT SERVICE — Spring Boot Configuration
# ═══════════════════════════════════════════════════════

server:
  port: 8004                    # HTTP port for this service

spring:
  application:
    name: alert-service         # Service name

# ─── Actuator (Prometheus Metrics) ───
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
